<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{% block meta_description %}Ramkiran Chevendra's personal blog — notes on web development, technology, and football.{% endblock %}">

    <title>{% block title %}Ramkiran's Blog{% endblock %}</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_head %}{% endblock %}
  </head>
  <body class="d-flex flex-column min-vh-100 bg-body">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{% url 'home' %}">Ramkiran's Blog</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
            <li class="nav-item"><a class="nav-link" href="https://facebook.com/ramkiran007" target="_blank" rel="noopener">Facebook</a></li>
            <li class="nav-item"><a class="nav-link" href="https://twitter.com/kinnu007" target="_blank" rel="noopener">Twitter</a></li>
            <li class="nav-item"><a class="nav-link" href="https://www.linkedin.com/in/ramkiranchevendra/" target="_blank" rel="noopener">LinkedIn</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5 flex-grow-1">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-top mt-auto">
      <div class="container py-4 d-flex flex-column flex-md-row justify-content-between align-items-center text-muted small">
        <span>&copy; {% now "Y" %} Ramkiran Chevendra</span>
        <span class="d-flex gap-3 mt-2 mt-md-0">
          <a class="text-muted text-decoration-none" href="https://facebook.com/ramkiran007" target="_blank" rel="noopener">Facebook</a>
          <a class="text-muted text-decoration-none" href="https://twitter.com/kinnu007" target="_blank" rel="noopener">Twitter</a>
          <a class="text-muted text-decoration-none" href="https://www.linkedin.com/in/ramkiranchevendra/" target="_blank" rel="noopener">LinkedIn</a>
        </span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
